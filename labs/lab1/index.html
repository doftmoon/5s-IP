<!doctype html>
<html>
	<head>
		<title>lr1</title>
		<meta charset="utf-8">
	</head>
	<body>
		<h1>Лабораторная работа 1</h1>
		<a href="https://www.belstu.by/">БГТУ</a>
		<div>
			<button onclick="showBrowserInfo()">Информация о браузере</button>
		</div>
		<div id="browser-info"></div>
		<script>
			showBrowserInfo = () => {
				console.log("Hello World");
				const info = document.getElementById('browser-info');
				info.innerHTML = `
					<p>appCodeName: ${navigator.appCodeName}</p>
					<p>appname: ${navigator.appName}</p>
					<p>appVersion: ${navigator.appVersion}</p>
					<p>userAgent: ${navigator.userAgent}</p>
				`;
			}
		</script>
	</body>
</html>
